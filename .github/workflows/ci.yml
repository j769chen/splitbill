name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Point lockfile at the public npm registry
        # The committed package-lock.json resolves tarballs from a private
        # corporate Artifactory registry that CI cannot reach. All deps are
        # public OSS, so rewrite the resolved URLs to registry.npmjs.org in
        # this ephemeral checkout. Integrity hashes are content-based, so they
        # still validate. The committed lockfile is left untouched.
        run: |
          sed -i 's#https://artifactory.stackadapt.dev/artifactory/api/npm/npm/#https://registry.npmjs.org/#g' package-lock.json

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
