name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # The committed package-lock.json resolves tarballs from a private
        # corporate Artifactory registry that CI cannot reach. All packages
        # are public OSS, so install from the public registry and rewrite the
        # lockfile's resolved hosts (integrity hashes are content-based, so
        # they still match).
        run: npm ci --registry=https://registry.npmjs.org --replace-registry-host=always

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
